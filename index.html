<!DOCTYPE html>
<html lang="en">
<head>
  <title>Erin &amp; Dan Engagement</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <meta name="twitter:card" content="summary">
  <meta property="og:title" content="Erin &amp; Dan Engagement">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://cmdann.github.io/engagement-pano/">
  <meta property="og:image" content="https://cmdann.github.io/engagement-pano/preview.png">
  <meta property="og:description" content="She said yes!">

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }

    #bsd-logo {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 100;
      height: 80px;
      cursor: pointer;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }

    .modal-box {
      background: #fff;
      color: #333;
      border-radius: 8px;
      padding: 32px 36px;
      max-width: 480px;
      width: 90%;
      position: relative;
      font-family: Arial, Helvetica, sans-serif;
    }
    .modal-close {
      position: absolute;
      top: 10px;
      right: 14px;
      background: none;
      border: none;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      color: #888;
    }
    .modal-close:hover { color: #333; }
    .modal-box h2 { margin-top: 0; }
    .modal-box p { line-height: 1.6; }
  </style>
</head>
<body>

  <a-scene vr-mode-ui="enabled: true"
           loading-screen="dotsColor: white; backgroundColor: black">
    <a-assets timeout="10000">
      <img id="pano-img" src="pano.jpg" crossorigin="anonymous">
      <img id="ring-img" src="assets/img/ring.png" crossorigin="anonymous">
    </a-assets>

    <!-- Equirectangular 360 panorama -->
    <a-sky src="#pano-img"></a-sky>

    <!--
      Hotspot from pano.xml: ath=74.6844°, atv=0.3681°
      World position on R=99 sphere:
        x =  99 * sin(74.6844°)            ≈  95.5
        y = -99 * sin( 0.3681°)            ≈  -0.6
        z = -99 * cos(74.6844°)            ≈ -26.1
    -->
    <a-image id="ring-spot"
             src="#ring-img"
             position="95.5 -0.6 -26.1"
             width="8" height="8"
             opacity="0.3"
             class="clickable"
             look-at="[camera]"
             animation__opacity-in="property: opacity; to: 1; dur: 200; startEvents: mouseenter"
             animation__opacity-out="property: opacity; to: 0.3; dur: 200; startEvents: mouseleave"
             animation__scale-in="property: scale; to: 1.4 1.4 1.4; dur: 200; startEvents: mouseenter"
             animation__scale-out="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave">
    </a-image>

    <!-- hlookat=120 from pano.xml → camera Y rotation = -120° -->
    <a-camera rotation="0 -120 0"
              wasd-controls="enabled: false"
              look-controls="magicWindowTrackingEnabled: true">
      <a-cursor raycaster="objects: .clickable"
                fuse="false"
                color="#fff"
                opacity="0.8"
                geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.016"
                material="color: #fff; shader: flat">
      </a-cursor>
    </a-camera>
  </a-scene>

  <img id="bsd-logo" src="assets/img/logo.png" alt="BSD XR"
       onclick="window.open('http://bitspacedevelopment.com', '_blank')">

  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <button class="modal-close" id="modal-close">&times;</button>
      <h2>She said yes!</h2>
      <p>
        This is a default featherlight lightbox.<br>
        It&rsquo;s flexible in height and width.<br>
        Everything that is used to display and style the box can be found in the
        <a href="https://github.com/noelboss/featherlight/blob/master/src/featherlight.css">featherlight.css</a>
        file which is pretty simple.
      </p>
    </div>
  </div>

  <script>
    const hotspot = document.querySelector('#ring-spot');
    const modal   = document.querySelector('#modal');
    const close   = document.querySelector('#modal-close');

    hotspot.addEventListener('click', () => modal.classList.add('active'));
    close.addEventListener('click',   () => modal.classList.remove('active'));
    modal.addEventListener('click',   e => { if (e.target === modal) modal.classList.remove('active'); });
  </script>

</body>
</html>
